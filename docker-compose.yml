services:
  api:
    build: .
    container_name: guardedrag_api
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: ${APP_NAME:-GuardedRAG API}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      SERVICE_NAME: ${SERVICE_NAME:-guardedrag}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GITHUB_MODELS_TOKEN: ${GITHUB_MODELS_TOKEN:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      CHAT_MODEL: ${CHAT_MODEL:-gpt-4.1-mini}
      LLM_PROVIDER: ${LLM_PROVIDER:-github}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-2}
      GITHUB_MODELS_MODEL: ${GITHUB_MODELS_MODEL:-openai/gpt-4.1}
      GITHUB_MODELS_BASE_URL: ${GITHUB_MODELS_BASE_URL:-https://models.github.ai/inference/chat/completions}
      GITHUB_MODELS_API_VERSION: ${GITHUB_MODELS_API_VERSION:-2026-03-10}
      VECTOR_STORE_PATH: ${VECTOR_STORE_PATH:-data/vector_store}
      TOP_K: ${TOP_K:-5}
      SIMILARITY_THRESHOLD: ${SIMILARITY_THRESHOLD:-0.75}
      CHUNK_SIZE: ${CHUNK_SIZE:-1000}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-200}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
